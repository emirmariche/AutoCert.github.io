<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoCert | The Escrow for Horsepower</title>
    
    <!-- React & DOM -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #000000; color: white; scroll-behavior: smooth; overflow-x: hidden; }
        
        /* Glassmorphism Utilities */
        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .glass-card {
            background: linear-gradient(145deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0.01) 100%);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .glass-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px -10px rgba(34, 197, 94, 0.2);
            border-color: rgba(34, 197, 94, 0.4);
        }

        /* Gradient Text */
        .text-gradient {
            background: linear-gradient(to right, #ffffff, #22c55e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Phone Frame for Embedded App */
        .phone-mockup {
            border: 12px solid #2a2a2a;
            border-radius: 45px;
            overflow: hidden;
            position: relative;
            background: #000;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8);
            width: 360px;
            height: 780px;
            margin: 0 auto;
        }
        .phone-notch {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 120px;
            height: 25px;
            background: #2a2a2a;
            border-bottom-left-radius: 16px;
            border-bottom-right-radius: 16px;
            z-index: 50;
        }

        /* Animations */
        .animate-fade-in { animation: fadeIn 0.8s ease-out forwards; }
        .animate-slide-up { animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #555; }

        /* Typography for Documents */
        .prose p { margin-bottom: 1rem; leading-trim: both; text-edge: cap; }
        .prose h3 { margin-top: 2rem; margin-bottom: 1rem; color: #fff; font-weight: 700; }
        .prose ul { list-style-type: disc; padding-left: 1.5rem; margin-bottom: 1rem; }
        .prose li { margin-bottom: 0.5rem; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- GLOBAL COMPONENTS ---
        const AutoCertLogo = ({ className = "", textSize = "text-3xl md:text-4xl" }) => (
            <div className={`flex items-center z-50 relative cursor-pointer group ${className}`}>
                <div className={`font-black italic tracking-tighter ${textSize}`} style={{ transform: 'skewX(-10deg)' }}>
                    <span className="text-transparent bg-clip-text bg-gradient-to-b from-white via-gray-300 to-gray-500 drop-shadow-[0_2px_2px_rgba(0,0,0,0.8)]">Auto</span>
                    <span className="text-transparent bg-clip-text bg-gradient-to-b from-green-300 via-green-500 to-green-800 drop-shadow-[0_2px_2px_rgba(0,0,0,0.8)]">Cert</span>
                </div>
            </div>
        );

        // --- SECTION COMPONENTS ---

        const Navbar = ({ activePage, setActivePage }) => {
            const [isScrolled, setIsScrolled] = useState(false);
            const [mobileMenuOpen, setMobileMenuOpen] = useState(false);

            useEffect(() => {
                const handleScroll = () => setIsScrolled(window.scrollY > 20);
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            const navLinks = [
                { name: 'Home', id: 'home' },
                { name: 'Investor Relations', id: 'investor' },
                { name: 'AI Reflection', id: 'reflection' }
            ];

            const handleNavClick = (id) => {
                setActivePage(id);
                setMobileMenuOpen(false);
                window.scrollTo(0, 0);
            };

            return (
                <nav className={`fixed w-full z-50 transition-all duration-300 ${isScrolled || activePage !== 'home' ? 'glass border-b border-white/5 bg-black/90 py-4' : 'bg-transparent py-6'}`}>
                    <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                        <div className="flex items-center justify-between">
                            <div onClick={() => handleNavClick('home')}>
                                <AutoCertLogo textSize="text-2xl md:text-3xl" />
                            </div>
                            
                            {/* Desktop Nav */}
                            <div className="hidden md:flex items-center space-x-8">
                                {navLinks.map(link => (
                                    <button key={link.id} onClick={() => handleNavClick(link.id)} 
                                       className={`text-sm font-medium transition-colors ${activePage === link.id ? 'text-green-400' : 'text-gray-300 hover:text-white'}`}>
                                        {link.name}
                                    </button>
                                ))}
                                <button onClick={() => handleNavClick('prototype')} className="bg-green-600 hover:bg-green-500 text-white px-6 py-2.5 rounded-full text-sm font-bold transition-all shadow-[0_0_15px_rgba(34,197,94,0.3)]">
                                    Launch Prototype
                                </button>
                            </div>

                            {/* Mobile Hamburger Toggle */}
                            <button className="md:hidden text-gray-300 hover:text-white p-2 z-50 relative" onClick={() => setMobileMenuOpen(!mobileMenuOpen)}>
                                <i className={`fas ${mobileMenuOpen ? 'fa-times' : 'fa-bars'} text-2xl`}></i>
                            </button>
                        </div>
                    </div>

                    {/* Mobile Menu Panel */}
                    {mobileMenuOpen && (
                        <div className="md:hidden absolute top-full left-0 w-full bg-black/95 border-b border-white/10 glass shadow-2xl py-4 px-4 flex flex-col space-y-4 animate-fade-in">
                            {navLinks.map(link => (
                                <button key={link.id} onClick={() => handleNavClick(link.id)} 
                                   className={`block w-full text-left px-4 py-2 rounded-lg text-base font-medium ${activePage === link.id ? 'bg-green-900/30 text-green-400' : 'text-gray-300 hover:bg-white/5 hover:text-white'}`}>
                                    {link.name}
                                </button>
                            ))}
                            <button onClick={() => handleNavClick('prototype')} className="block w-full px-4 py-3 bg-green-600 text-white text-center rounded-lg font-bold shadow-lg">
                                Launch Prototype
                            </button>
                        </div>
                    )}
                </nav>
            );
        };

        // --- PAGE COMPONENTS ---

        // 1. HOME PAGE
        const HomePage = ({ setActivePage }) => {
            const scrollToSection = (e, id) => {
                e.preventDefault();
                const element = document.getElementById(id);
                if (element) {
                    element.scrollIntoView({ behavior: 'smooth' });
                }
            };

            return (
                <div className="animate-fade-in">
                    <section id="hero" className="relative min-h-screen flex items-center pt-32 pb-20 lg:pt-48 lg:pb-32 overflow-hidden bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-green-900/20 via-black to-black">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 relative z-10 text-center">
                            <h1 className="text-5xl md:text-7xl font-extrabold tracking-tight mb-8 leading-tight text-white">
                                Don't Buy a Lemon.<br />
                                <span className="text-gradient">Buy Verified.</span>
                            </h1>
                            <p className="mt-4 max-w-2xl mx-auto text-xl text-gray-300 mb-10 leading-relaxed">
                                The world's first Proof-of-Condition escrow platform. We combine IoT sensors, AI diagnostics, and Blockchain smart contracts to make car scams impossible.
                            </p>
                            <div className="flex flex-col sm:flex-row justify-center gap-4">
                                <button onClick={() => { setActivePage('prototype'); window.scrollTo(0,0); }} className="bg-white text-black px-8 py-4 rounded-full font-bold text-lg hover:bg-gray-200 transition-all shadow-[0_0_20px_rgba(255,255,255,0.1)] hover:shadow-[0_0_30px_rgba(255,255,255,0.2)] flex items-center justify-center gap-2">
                                    <i className="fas fa-play"></i> Try the App
                                </button>
                                <a href="#how-it-works" onClick={(e) => scrollToSection(e, 'how-it-works')} className="glass text-white px-8 py-4 rounded-full font-bold text-lg hover:bg-white/10 transition-all cursor-pointer inline-flex items-center justify-center">
                                    How it Works
                                </a>
                            </div>
                            
                            <div className="mt-20 pt-10 border-t border-white/10 grid grid-cols-1 md:grid-cols-3 gap-8 max-w-4xl mx-auto">
                                <div>
                                    <div className="text-3xl font-bold text-white">36M+</div>
                                    <div className="text-gray-400 text-sm mt-1">Used Cars Sold Annually</div>
                                </div>
                                <div>
                                    <div className="text-3xl font-bold text-red-500">$1B+</div>
                                    <div className="text-gray-400 text-sm mt-1">Lost to Odometer Fraud</div>

                                <div>

                            </div>

                    </section>

                    <section id="problem" className="py-24 bg-[#0a0a0a]">

                            <div className="grid md:grid-cols-2 gap-16 items-center">
                                <div className="space-y-6">
                                    <h2 className="text-green-500 font-mono text-sm tracking-widest uppercase">The Problem</h2>
                                    <h3 className="text-3xl md:text-4xl font-bold text-white">The "Wild West" of Used Cars</h3>
                                    <p className="text-gray-300 text-lg leading-relaxed">
                                        Buying a car on Facebook Marketplace or Craigslist is a gamble. Sellers use cheap tools to clear engine codes right before a test drive, hiding major mechanical failures. Once you hand over cash, there is no refund policy. 
                                    </p>
                                    
                                    <div className="space-y-4 mt-6">
                                        <div className="flex items-start gap-4">
                                            <div className="w-10 h-10 rounded-full bg-red-500/10 flex items-center justify-center text-red-500 mt-1">
                                                <i className="fas fa-eye-slash"></i>
                                            </div>
                                            <div>
                                                <h4 className="text-white font-bold text-lg">Hidden Damage</h4>
                                                <p className="text-sm text-gray-400 leading-relaxed mt-1">Rod knock and transmission slips are often masked by thick oil or short test drives.</p>
                                            </div>
                                        </div>
                                        <div className="flex items-start gap-4">
                                            <div className="w-10 h-10 rounded-full bg-red-500/10 flex items-center justify-center text-red-500 mt-1">
                                                <i className="fas fa-eraser"></i>
                                            </div>
                                            <div>
                                                <h4 className="text-white font-bold text-lg">Code Clearing</h4>
                                                <p className="text-sm text-gray-400 leading-relaxed mt-1">Sellers wipe the ECU memory to turn off the "Check Engine" light temporarily.</p>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                                <div className="relative">
                                    <div className="absolute inset-0 bg-gradient-to-r from-green-600 to-emerald-600 blur-3xl opacity-20 rounded-full"></div>
                                    <div className="glass-card p-8 rounded-3xl relative z-10 border-l-4 border-red-500 hover:scale-[1.02] transition-transform duration-300">
                                        <div className="flex items-center gap-4 mb-6">
                                            <div className="w-12 h-12 bg-red-500/20 rounded-full flex items-center justify-center text-red-500">
                                                <i className="fas fa-exclamation-triangle"></i>
                                            </div>
                                            <div>
                                                <h4 className="text-xl font-bold text-white">The Buyer's Risk</h4>
                                                <p className="text-red-400 text-sm">Average Loss: $4,500</p>
                                            </div>
                                        </div>
                                        <p className="text-gray-300 italic leading-relaxed text-lg">
                                            "I bought a Jeep for $12k. Two days later the transmission blew up. The seller blocked my number. I lost my savings."
                                        </p>
                                        <div className="mt-6 flex gap-2">
                                            <span className="px-3 py-1 bg-red-500/10 text-red-400 text-xs rounded-full font-semibold border border-red-500/20">No Warranty</span>
                                            <span className="px-3 py-1 bg-red-500/10 text-red-400 text-xs rounded-full font-semibold border border-red-500/20">No Recourse</span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </section>

                    <section id="tech" className="py-24 relative overflow-hidden bg-black">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                            <div className="text-center mb-16">
                                <h2 className="text-3xl md:text-5xl font-bold mb-4 text-white">Powered by <span className="text-gradient">4IR Technology</span></h2>
                                <p className="text-gray-400 max-w-2xl mx-auto leading-relaxed text-lg">AutoCert leverages three pillars of the Fourth Industrial Revolution to create a trustless transaction layer.</p>
                            </div>
                            
                            <div className="grid md:grid-cols-3 gap-8">
                                {/* IoT Feature */}
                                <div className="glass-card rounded-3xl group hover:bg-green-900/10 transition-colors overflow-hidden flex flex-col">
                                    <div className="h-40 w-full overflow-hidden">
                                        <img src="https://images.unsplash.com/photo-1518770660439-4636190af475?ixlib=rb-4.0.3&auto=format&fit=crop&w=600&q=80" alt="IoT Hardware Concept" className="w-full h-full object-cover opacity-60 group-hover:opacity-100 transition-opacity duration-500 group-hover:scale-105" />
                                    </div>
                                    <div className="p-8 flex-1 flex flex-col">
                                        <div className="w-12 h-12 rounded-full bg-green-500/20 flex items-center justify-center mb-4 text-green-400">
                                            <i className="fas fa-wifi text-xl"></i>
                                        </div>
                                        <h3 className="text-xl font-bold mb-3 text-white">IoT Hardware</h3>
                                        <p className="text-gray-400 text-sm leading-relaxed mb-6 flex-1">
                                            Our TrueKey OBDII dongle plugs directly into the vehicle's CAN Bus, reading 3,000+ data points per second including engine temperature, fuel trim, and transmission timing.
                                        </p>
                                        <span className="text-xs font-mono text-green-400 border border-green-500/30 px-3 py-1.5 rounded-lg bg-green-500/5 inline-block w-max">HARDWARE LAYER</span>
                                    </div>
                                </div>

                                {/* AI Feature */}
                                <div className="glass-card rounded-3xl border-emerald-500/30 shadow-[0_0_30px_rgba(16,185,129,0.1)] group hover:bg-emerald-900/10 transition-colors overflow-hidden flex flex-col">
                                    <div className="h-40 w-full overflow-hidden relative">
                                        <div className="absolute inset-0 bg-emerald-500/20 mix-blend-overlay z-10"></div>
                                        <img src="https://images.unsplash.com/photo-1551288049-bebda4e38f71?ixlib=rb-4.0.3&auto=format&fit=crop&w=600&q=80" alt="AI Analytics Concept" className="w-full h-full object-cover opacity-60 group-hover:opacity-100 transition-opacity duration-500 group-hover:scale-105" />
                                    </div>
                                    <div className="p-8 flex-1 flex flex-col">
                                        <div className="w-12 h-12 rounded-full bg-emerald-500/20 flex items-center justify-center mb-4 text-emerald-400">
                                            <i className="fas fa-brain text-xl"></i>
                                        </div>
                                        <h3 className="text-xl font-bold mb-3 text-white">Predictive AI</h3>
                                        <p className="text-gray-400 text-sm leading-relaxed mb-6 flex-1">
                                            It doesn't just read codes. Our AI analyzes vibration patterns to detect "Rod Knock" and checks digital timestamps to catch sellers who cleared codes right before you arrived.
                                        </p>
                                        <span className="text-xs font-mono text-emerald-400 border border-emerald-500/30 px-3 py-1.5 rounded-lg bg-emerald-500/5 inline-block w-max">INTELLIGENCE LAYER</span>
                                    </div>
                                </div>

                                {/* Blockchain Feature */}
                                <div className="glass-card rounded-3xl group hover:bg-green-900/10 transition-colors overflow-hidden flex flex-col">
                                    <div className="h-40 w-full overflow-hidden relative">
                                        <div className="absolute inset-0 bg-green-500/20 mix-blend-overlay z-10"></div>
                                        <img src="https://images.unsplash.com/photo-1639762681057-408e52192e55?ixlib=rb-4.0.3&auto=format&fit=crop&w=600&q=80" alt="Blockchain Concept" className="w-full h-full object-cover opacity-60 group-hover:opacity-100 transition-opacity duration-500 group-hover:scale-105" />
                                    </div>
                                    <div className="p-8 flex-1 flex flex-col">
                                        <div className="w-12 h-12 rounded-full bg-green-500/20 flex items-center justify-center mb-4 text-green-400">
                                            <i className="fas fa-link text-xl"></i>
                                        </div>
                                        <h3 className="text-xl font-bold mb-3 text-white">Smart Contracts</h3>
                                        <p className="text-gray-400 text-sm leading-relaxed mb-6 flex-1">
                                            Funds are held in a decentralized escrow vault. The contract executes automatically: if the scan passes, money moves. If it fails, money returns. No middleman needed.
                                        </p>
                                        <span className="text-xs font-mono text-green-400 border border-green-500/30 px-3 py-1.5 rounded-lg bg-green-500/5 inline-block w-max">FINANCIAL LAYER</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </section>

                    <section id="how-it-works" className="py-24 bg-[#0a0a0a]">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                            <div className="grid md:grid-cols-2 gap-16 items-center">
                                <div className="space-y-10">
                                    <h2 className="text-3xl md:text-4xl font-bold text-white">How it Works</h2>
                                    
                                    <div className="flex gap-6 group">
                                        <div className="flex-shrink-0 w-12 h-12 rounded-full bg-green-600/20 border border-green-500/50 flex items-center justify-center font-bold text-green-400 group-hover:bg-green-600 group-hover:text-white transition-colors">1</div>
                                        <div>
                                            <h3 className="text-xl font-bold text-white mb-2">Load the Vault</h3>
                                            <p className="text-gray-400 leading-relaxed">Buyer deposits funds into the AutoCert Smart Contract. Seller sees "Proof of Funds" but cannot access the money yet.</p>
                                        </div>
                                    </div>

                                    <div className="flex gap-6 group">
                                        <div className="flex-shrink-0 w-12 h-12 rounded-full bg-green-600/20 border border-green-500/50 flex items-center justify-center font-bold text-green-400 group-hover:bg-green-600 group-hover:text-white transition-colors">2</div>
                                        <div>
                                            <h3 className="text-xl font-bold text-white mb-2">Verified Drive</h3>
                                            <p className="text-gray-400 leading-relaxed">Plug the TrueKey device into the OBDII port. Drive the car for 5 minutes. Our AI analyzes engine health in real-time.</p>
                                        </div>
                                    </div>

                                    <div className="flex gap-6 group">
                                        <div className="flex-shrink-0 w-12 h-12 rounded-full bg-green-600/20 border border-green-500/50 flex items-center justify-center font-bold text-green-400 group-hover:bg-green-600 group-hover:text-white transition-colors">3</div>
                                        <div>
                                            <h3 className="text-xl font-bold text-white mb-2">Instant Settlement</h3>
                                            <p className="text-gray-400 leading-relaxed">If the car passes, funds release instantly. If the AI detects fraud (like cleared codes), funds are returned to the buyer.</p>
                                        </div>
                                    </div>
                                </div>
                                
                                <div className="glass-card p-8 rounded-3xl relative overflow-hidden">

                                        <img src="https://images.unsplash.com/photo-1551836022-d5d88e9218df?ixlib=rb-4.0.3&auto=format&fit=crop&w=600&q=80" alt="Target Market Visual" className="w-full h-full object-cover" />
                                        <div className="absolute inset-0 bg-gradient-to-b from-transparent to-[#111111]"></div>
                                    </div>
                                    
                                    <div className="relative z-10 pt-16">
                                        <h3 className="text-sm font-mono text-green-400 mb-2 uppercase tracking-wider">Target Market</h3>
                                        <h4 className="text-3xl font-bold text-white mb-8">The "Anxious Upgrader"</h4>
                                        
                                        <div className="grid grid-cols-2 gap-4 mb-8">
                                            <div className="bg-black/60 p-4 rounded-xl border border-white/5">
                                                <div className="text-gray-500 text-xs mb-1 uppercase tracking-wider">Age Bracket</div>
                                                <div className="text-white font-bold text-lg">24-40 (Gen Z/Y)</div>
                                            </div>
                                            <div className="bg-black/60 p-4 rounded-xl border border-white/5">
                                                <div className="text-gray-500 text-xs mb-1 uppercase tracking-wider">Income Level</div>
                                                <div className="text-white font-bold text-lg">$50k - $90k</div>

                                        <div className="bg-green-900/20 border-l-4 border-green-500 p-4 rounded-r-xl">

                                            </p>
                                        </div>
                                    </div>
                                </div>

                    <section className="py-20 bg-[#0a0a0a] border-t border-white/5 text-center">
                         <div className="max-w-3xl mx-auto px-4 sm:px-6 lg:px-8">
                            <h2 className="text-3xl font-bold text-white mb-6">Ready to Eliminate Used Car Fraud?</h2>
                            <p className="text-gray-400 mb-8 text-lg">Join us in building the trust layer for the secondary auto market. Run a simulation of our AI technology to see how it works.</p>
                            <button onClick={() => { setActivePage('prototype'); window.scrollTo(0,0); }} className="inline-block bg-green-600 hover:bg-green-500 text-white px-8 py-4 rounded-full text-lg font-bold transition-all shadow-[0_0_20px_rgba(34,197,94,0.4)] hover:shadow-[0_0_30px_rgba(34,197,94,0.6)]">
                                Launch Interactive Prototype
                            </button>
                         </div>
                    </section>
                </div>

        // 2. INVESTOR RELATIONS PAGE
        const InvestorPage = () => {
            const [isFullscreen, setIsFullscreen] = useState(false);

            const toggleFullScreen = () => {
                setIsFullscreen(!isFullscreen);

            return (
                <div className="pt-32 pb-24 max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 animate-fade-in">

                        <h3 className="text-2xl text-white border-b border-gray-700 pb-2 mb-4">1. The Development Process & Prompting Strategy</h3>
                        <p>First off, we started the process by laying out all of the parameters for the website to the AI. We gave it instructions like including four different webpages/tabs for each document, along with including placeholders so that we could see what the general layout of the website was.</p>
                        <p>However, the fact that we started out with the layout led Gemini to deviate and sometimes completely change the design. We had to go in and guide it back in the right direction by going to look at the project requirements, and explicitly telling the AI the type of layout we wanted (sleek, modern, and trustworthy).</p>
                        <p>Our prompting technique involved an iterative approach. We started with broad commands to generate the foundational structure, but quickly learned we needed to use highly specific, constraint-based prompts to get the exact design and functionality we needed without the AI getting distracted.</p>

                        <h3 className="text-2xl text-white border-b border-gray-700 pb-2 mt-8 mb-4">2. Strengths of Generative AI</h3>
                        <p>The biggest strength of using the AI is definitely the speed at which we could develop the website, which allowed us to focus purely on the design and aesthetics of the application. Another strength would be how well the AI followed our instructions in the end. For the most part, it did replicate the general idea perfectly and did a good job of editing specific parts of the website, which is something that impressed me quite a bit.</p>

                        <h3 className="text-2xl text-white border-b border-gray-700 pb-2 mt-8 mb-4">3. Limitations & Challenges</h3>
                        <p>However, there are a few limitations, of which the biggest one was definitely context and memory loss. Sometimes it forgot to keep certain aspects of the website we liked from previous iterations. We then had to remind it to place those elements back into the website numerous times, especially at the beginning when it didn’t have much context.</p>

                        <h3 className="text-2xl text-white border-b border-gray-700 pb-2 mt-8 mb-4">4. The Role of Human Oversight</h3>
                        <p>Another limitation is its difficulty in matching up the actual images it included with the specific content of the website. This is a place where human oversight was so important to ensure coherence and make sure the narrative made sense.</p>
                        <p>While the AI provided significant value in generating foundational code and drafting the initial layouts, human input and creativity were absolutely essential. We had to define the underlying business logic, shape the "Anxious Upgrader" persona, and manually curate the final content to ensure it accurately represented our innovation and met the project rubrics.</p>

                        <h3 className="text-2xl text-white border-b border-gray-700 pb-2 mt-8 mb-4">5. Insights, Lessons Learned & Recommendations</h3>
                        <p>The biggest insight we gained is that AI is an excellent co-pilot, but it cannot run on auto-pilot. If you just give it a vague prompt, the result will be generic or completely off-track. </p>
                        <p>Our recommendation for effectively leveraging AI in website development is to break the project into smaller, manageable chunks rather than asking for a whole website at once. You have to be highly specific with your instructions, constantly supervise the outputs, and always review the final content to make sure it aligns with your specific brand and messaging.</p>
